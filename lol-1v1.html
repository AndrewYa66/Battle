<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL 1v1 單挑記分板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C89B3C;
    --gold-dim: #785A28;
    --gold-bright: #F0C75E;
    --dark: #010A13;
    --panel: #0A1428;
    --panel2: #0F2032;
    --border: #1E2D40;
    --row-alt: #0D1B2E;
    --text: #E0C882;
    --muted: #7A8A9A;
    --blue: #1A78C2;
    --blue-glow: #1A78C240;
    --red: #C84B31;
    --red-glow: #C84B3140;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, #0a2040 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #0d1e2e22 39px, #0d1e2e22 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #0d1e2e22 39px, #0d1e2e22 40px);
    min-height: 100vh;
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    color: var(--text);
  }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #0f2032 0%, #07111c 100%);
    border-bottom: 1px solid var(--gold-dim);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px #00000088;
  }
  header .logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .patch-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    background: #ffffff0a;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: monospace;
  }

  /* ── Scoreboard ── */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 48px 1fr;
    align-items: center;
    gap: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .player-side { text-align: center; }
  .player-name-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    padding-bottom: 2px;
  }
  .player-name-wrap:hover { border-color: currentColor; }
  .player-name-input {
    background: transparent;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    outline: none;
    cursor: pointer;
    min-width: 10px;
    max-width: 160px;
  }
  .player-name-input:focus { cursor: text; }
  .p1 .player-name-input { color: var(--blue); }
  .p2 .player-name-input { color: var(--red); }
  .edit-icon { opacity: 0.5; width: 13px; height: 13px; flex-shrink: 0; }
  .player-score {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
    margin-top: 6px;
    transition: transform 0.15s;
  }
  .p1 .player-score { color: var(--blue); text-shadow: 0 0 20px var(--blue-glow); }
  .p2 .player-score { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }
  .score-bump { animation: bump 0.3s ease; }
  @keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
  .vs-divider {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--gold-dim);
    text-align: center;
  }
  .played-count {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 3px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 69px;
    z-index: 90;
  }
  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 360px;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    pointer-events: none;
    color: var(--muted);
  }
  #search {
    width: 100%;
    background: #ffffff08;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 32px 8px 32px;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--gold-dim); }
  #search::placeholder { color: var(--muted); }
  .clear-search {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: none;
    padding: 2px;
  }
  .filter-btns { display: flex; gap: 6px; margin-left: auto; }
  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: #c89b3c15; }
  .reset-btn {
    background: none;
    border: 1px solid #3A4050;
    border-radius: 5px;
    color: #3A4050;
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── Table ── */
  .table-wrap {
    padding: 0 24px 40px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    background: var(--panel2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 12px;
    border-bottom: 1px solid var(--gold-dim);
    position: sticky;
    top: 113px;
    z-index: 80;
  }
  thead th:nth-child(1) { width: auto; text-align: left; padding-left: 4px; }
  thead th:nth-child(2), thead th:nth-child(3) { width: 90px; text-align: center; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  tbody tr:nth-child(odd)  { background: var(--dark); }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr.won-p1 { background: #1A78C210; }
  tbody tr.won-p2 { background: #C84B3110; }
  tbody tr:hover { background: #1a2d4020; }
  tbody tr.won-p1:hover { background: #1A78C220; }
  tbody tr.won-p2:hover { background: #C84B3120; }

  td { padding: 8px 12px; vertical-align: middle; }
  td:nth-child(1) { padding-left: 4px; }
  td:nth-child(2), td:nth-child(3) { text-align: center; }

  .champ-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .champ-icon {
    width: 40px;
    height: 40px;
    border-radius: 4px;
    border: 1px solid var(--gold-dim);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    overflow: hidden;
  }
  .champ-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .champ-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    transition: color 0.2s;
  }
  tr.won-p1 .champ-name,
  tr.won-p2 .champ-name { color: var(--text); font-weight: 500; }

  /* ── Win dot ── */
  .dot-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2.5px solid #2A3A4E;
    background: transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, background 0.12s, border-color 0.12s, box-shadow 0.12s;
    padding: 0;
  }
  .dot-btn:hover { transform: scale(1.25); }
  .dot-btn.p1-active {
    border-color: var(--blue);
    background: var(--blue);
    box-shadow: 0 0 10px var(--blue-glow);
  }
  .dot-btn.p1-hover:not(.p1-active) { border-color: var(--blue); }
  .dot-btn.p2-active {
    border-color: var(--red);
    background: var(--red);
    box-shadow: 0 0 10px var(--red-glow);
  }
  .dot-btn.p2-hover:not(.p2-active) { border-color: var(--red); }

  /* ── Loading ── */
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 999;
    transition: opacity 0.4s;
  }
  #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 13px; }

  /* ── Empty / error ── */
  .empty-msg {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }
  .error-msg {
    text-align: center;
    padding: 40px;
    color: var(--red);
    font-size: 13px;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    color: #2A3A4A;
    font-size: 11px;
    padding: 20px;
    border-top: 1px solid #0d1b2e;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header h1 { font-size: 14px; }
    .scoreboard { padding: 12px 16px; }
    .player-score { font-size: 32px; }
    .toolbar { padding: 10px 16px; flex-wrap: wrap; }
    .table-wrap { padding: 0 10px 40px; }
    thead th:nth-child(2), thead th:nth-child(3) { width: 70px; }
    .filter-btns { display: none; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <svg class="logo-icon" viewBox="0 0 24 24" fill="#C89B3C" width="48" height="48">
    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
  </svg>
  <div class="spinner"></div>
  <div class="loading-text">正在載入英雄資料…</div>
</div>

<header>
  <svg class="logo-icon" viewBox="0 0 24 24" fill="#C89B3C">
    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
  </svg>
  <h1>1v1 單挑記分板</h1>
  <span class="patch-badge" id="patch-badge">載入中…</span>
</header>

<div class="scoreboard">
  <div class="player-side p1">
    <div class="player-name-wrap">
      <input class="player-name-input" id="p1-name" value="玩家 1" maxlength="16" aria-label="玩家1名稱">
      <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" color="#1A78C2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </div>
    <div class="player-score" id="p1-score">0</div>
  </div>
  <div class="vs-divider">
    VS<br>
    <div class="played-count" id="played-count"></div>
  </div>
  <div class="player-side p2">
    <div class="player-name-wrap">
      <input class="player-name-input" id="p2-name" value="玩家 2" maxlength="16" aria-label="玩家2名稱">
      <svg class="edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" color="#C84B31">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </div>
    <div class="player-score" id="p2-score">0</div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="搜尋英雄名稱…" autocomplete="off">
    <button class="clear-search" id="clear-search" aria-label="清除搜尋">✕</button>
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="p1">藍方勝</button>
    <button class="filter-btn" data-filter="p2">紅方勝</button>
    <button class="filter-btn" data-filter="none">未對戰</button>
  </div>
  <button class="reset-btn" id="reset-btn">清除結果</button>
</div>

<div class="table-wrap">
  <table id="champ-table" aria-label="英雄對戰記錄">
    <thead>
      <tr>
        <th>英雄</th>
        <th id="th-p1">玩家 1</th>
        <th id="th-p2">玩家 2</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-msg" class="empty-msg" style="display:none">找不到符合的英雄</div>
  <div id="error-msg" class="error-msg" style="display:none"></div>
</div>

<footer>資料來源：Riot Games Data Dragon · 結果儲存於本機 localStorage</footer>

<script>
const STATE_KEY = "lol1v1-state-v3";
let champions = [];
let results = {};
let version = "";
let activeFilter = "all";

// ── Persist ──
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || "{}");
    if (s.p1) document.getElementById("p1-name").value = s.p1;
    if (s.p2) document.getElementById("p2-name").value = s.p2;
    if (s.results) results = s.results;
  } catch (_) {}
}
function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      p1: document.getElementById("p1-name").value,
      p2: document.getElementById("p2-name").value,
      results
    }));
  } catch (_) {}
}

// ── Score UI ──
function bumpScore(el) {
  el.classList.remove("score-bump");
  void el.offsetWidth;
  el.classList.add("score-bump");
}
function updateScoreboard() {
  const vals = Object.values(results);
  const p1w = vals.filter(v => v === "p1").length;
  const p2w = vals.filter(v => v === "p2").length;
  const played = vals.filter(Boolean).length;
  const p1el = document.getElementById("p1-score");
  const p2el = document.getElementById("p2-score");
  if (p1el.textContent !== String(p1w)) { p1el.textContent = p1w; bumpScore(p1el); }
  if (p2el.textContent !== String(p2w)) { p2el.textContent = p2w; bumpScore(p2el); }
  document.getElementById("played-count").textContent = played ? `已對戰 ${played} 場` : "";
  const p1n = document.getElementById("p1-name").value;
  const p2n = document.getElementById("p2-name").value;
  document.getElementById("th-p1").textContent = p1n;
  document.getElementById("th-p2").textContent = p2n;
}

// ── Row rendering ──
function makeRow(champ) {
  const winner = results[champ.id] || null;
  const tr = document.createElement("tr");
  tr.dataset.id = champ.id;
  tr.dataset.name = champ.zhName;
  if (winner === "p1") tr.className = "won-p1";
  else if (winner === "p2") tr.className = "won-p2";

  // Champion cell
  const tdChamp = document.createElement("td");
  const wrap = document.createElement("div");
  wrap.className = "champ-cell";
  const iconDiv = document.createElement("div");
  iconDiv.className = "champ-icon";
  const img = document.createElement("img");
  img.src = `https://ddragon.leagueoflegends.com/cdn/${version}/img/champion/${champ.id}.png`;
  img.alt = champ.zhName;
  img.onerror = () => { iconDiv.innerHTML = champ.zhName.slice(0, 2); };
  iconDiv.appendChild(img);
  const nameSpan = document.createElement("span");
  nameSpan.className = "champ-name";
  nameSpan.textContent = champ.zhName;
  wrap.appendChild(iconDiv);
  wrap.appendChild(nameSpan);
  tdChamp.appendChild(wrap);

  // P1 dot
  const td1 = document.createElement("td");
  const btn1 = document.createElement("button");
  btn1.className = "dot-btn" + (winner === "p1" ? " p1-active" : "");
  btn1.setAttribute("aria-label", `${champ.zhName} — 玩家1獲勝`);
  btn1.addEventListener("mouseenter", () => btn1.classList.add("p1-hover"));
  btn1.addEventListener("mouseleave", () => btn1.classList.remove("p1-hover"));
  btn1.addEventListener("click", () => toggleWin(champ.id, "p1"));
  td1.appendChild(btn1);

  // P2 dot
  const td2 = document.createElement("td");
  const btn2 = document.createElement("button");
  btn2.className = "dot-btn" + (winner === "p2" ? " p2-active" : "");
  btn2.setAttribute("aria-label", `${champ.zhName} — 玩家2獲勝`);
  btn2.addEventListener("mouseenter", () => btn2.classList.add("p2-hover"));
  btn2.addEventListener("mouseleave", () => btn2.classList.remove("p2-hover"));
  btn2.addEventListener("click", () => toggleWin(champ.id, "p2"));
  td2.appendChild(btn2);

  tr.appendChild(tdChamp);
  tr.appendChild(td1);
  tr.appendChild(td2);
  return tr;
}

function renderTable() {
  const search = document.getElementById("search").value.trim().toLowerCase();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  let count = 0;
  champions.forEach(champ => {
    // Filter by search
    if (search && !champ.zhName.toLowerCase().includes(search) && !champ.id.toLowerCase().includes(search)) return;
    // Filter by tab
    const w = results[champ.id] || null;
    if (activeFilter === "p1" && w !== "p1") return;
    if (activeFilter === "p2" && w !== "p2") return;
    if (activeFilter === "none" && w) return;
    tbody.appendChild(makeRow(champ));
    count++;
  });
  document.getElementById("empty-msg").style.display = count === 0 ? "" : "none";
}

function toggleWin(champId, player) {
  const cur = results[champId];
  results[champId] = cur === player ? null : player;
  saveState();
  updateScoreboard();
  // Update row in-place
  const tr = document.querySelector(`tr[data-id="${champId}"]`);
  if (!tr) return;
  const winner = results[champId];
  tr.className = winner === "p1" ? "won-p1" : winner === "p2" ? "won-p2" : "";
  const btn1 = tr.querySelector("td:nth-child(2) .dot-btn");
  const btn2 = tr.querySelector("td:nth-child(3) .dot-btn");
  btn1.className = "dot-btn" + (winner === "p1" ? " p1-active" : "");
  btn2.className = "dot-btn" + (winner === "p2" ? " p2-active" : "");
  // If filtering, re-render to hide/show
  if (activeFilter !== "all") renderTable();
}

// ── Fetch ddragon ──
async function fetchChampions() {
  try {
    const verRes = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions = await verRes.json();
    version = versions[0];
    document.getElementById("patch-badge").textContent = `Patch ${version}`;

    const dataRes = await fetch(`https://ddragon.leagueoflegends.com/cdn/${version}/data/zh_TW/champion.json`);
    const data = await dataRes.json();
    champions = Object.values(data.data)
      .map(c => ({ id: c.id, zhName: c.name }))
      .sort((a, b) => a.zhName.localeCompare(b.zhName, "zh-TW"));

    loadState();
    renderTable();
    updateScoreboard();

    const ov = document.getElementById("loading-overlay");
    ov.classList.add("fade-out");
    setTimeout(() => ov.remove(), 400);
  } catch (e) {
    document.getElementById("loading-overlay").remove();
    const em = document.getElementById("error-msg");
    em.textContent = "無法連線至 Riot 伺服器，請檢查網路後重新整理頁面。";
    em.style.display = "";
    document.getElementById("patch-badge").textContent = "連線失敗";
  }
}

// ── Event listeners ──
document.getElementById("search").addEventListener("input", function() {
  document.getElementById("clear-search").style.display = this.value ? "" : "none";
  renderTable();
});
document.getElementById("clear-search").addEventListener("click", () => {
  document.getElementById("search").value = "";
  document.getElementById("clear-search").style.display = "none";
  renderTable();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    activeFilter = this.dataset.filter;
    renderTable();
  });
});

document.getElementById("reset-btn").addEventListener("click", () => {
  if (!confirm("確定要清除所有對戰結果嗎？")) return;
  results = {};
  saveState();
  updateScoreboard();
  renderTable();
});

["p1-name", "p2-name"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    saveState();
    updateScoreboard();
  });
});

// ── Init ──
fetchChampions();
</script>
</body>
</html>
